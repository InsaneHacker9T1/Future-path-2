<!DOCTYPE html>
<html>
<head>
  <title>FuturePath 🚀</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:Arial;
      text-align:center;
      padding:20px;
    }
    .card {
      background:#1e293b;
      padding:20px;
      margin:15px;
      border-radius:12px;
    }
    button {
      padding:12px 22px;
      border:none;
      border-radius:10px;
      margin:6px;
      font-size:16px;
      cursor:pointer;
    }
    .login { background:#4285F4; color:white; }
    .plan { background:orange; color:black; }
  </style>
</head>

<body>

<h1>FuturePath 🚀</h1>

<div class="card">
  <button class="login" onclick="login()">Login with Google</button>
  <h3 id="user">Checking...</h3>
</div>

<div class="card">
  <h3 id="status">Checking...</h3>
</div>

<div class="card">
  <h3>Upgrade Plans 💰</h3>
  <button class="plan" onclick="buy('https://rzp.io/rzp/FKHtKbmY')">₹29 Basic</button>
  <button class="plan" onclick="buy('https://rzp.io/rzp/62kni95')">₹99 Pro</button>
  <button class="plan" onclick="buy('https://rzp.io/rzp/pCtzA6rZ')">₹149 Premium</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAgggiNrjZw2G8ncfM9LTfr08_edEhkSJw",
  authDomain: "futurepath-c6e04.firebaseapp.com",
  projectId: "futurepath-c6e04"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

// 🔥 LOGIN
function login() {
  auth.signInWithRedirect(provider);
}

// 🔥 AFTER REDIRECT (MAIN FIX)
auth.getRedirectResult().then((result) => {
  if (result.user) {
    localStorage.setItem("user", result.user.email); // SAVE LOGIN
  }
});

// 🔥 FORCE UI UPDATE FROM LOCAL STORAGE
function checkLogin() {
  const user = localStorage.getItem("user");

  if (user) {
    document.getElementById("user").innerText = user;
    document.getElementById("status").innerText = "Free Plan";
    window.currentUser = true;
  } else {
    document.getElementById("user").innerText = "Not logged in";
    document.getElementById("status").innerText = "Not logged in";
    window.currentUser = false;
  }
}

// RUN AFTER PAGE LOAD
setTimeout(checkLogin, 1000);

// 💳 PAYMENT FIX
function buy(link) {
  if (!window.currentUser) {
    alert("Please login first ⚠️");
    return;
  }

  window.location.href = link;
}
</script>

</body>
</html>
