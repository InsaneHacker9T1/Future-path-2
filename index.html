<!DOCTYPE html>
<html>
<head>
  <title>FuturePath 🚀</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:Arial;
      text-align:center;
      padding:20px;
    }

    .card {
      background:#1e293b;
      padding:20px;
      margin:15px;
      border-radius:12px;
    }

    button {
      padding:10px 20px;
      border:none;
      border-radius:8px;
      margin:5px;
      font-size:16px;
    }

    .login { background:#4285F4; color:white; }
    .plan { background:orange; color:black; }
    .paid { background:green; color:white; }
  </style>
</head>

<body>

  <h1>FuturePath 🚀</h1>

  <!-- LOGIN -->
  <div class="card">
    <button class="login" onclick="login()">Login with Google</button>
    <h3 id="user">Not logged in</h3>
  </div>

  <!-- STATUS -->
  <div class="card">
    <h3 id="status">Checking...</h3>
  </div>

  <!-- PLANS -->
  <div class="card">
    <h3>Upgrade Plans 💰</h3>
    <button class="plan" onclick="buy(29)">₹29 Basic</button>
    <button class="plan" onclick="buy(99)">₹99 Pro</button>
    <button class="plan" onclick="buy(149)">₹149 Premium</button>
  </div>

  <!-- TEMP BUTTON -->
  <div class="card">
    <button class="paid" onclick="fakePaid()">I Have Paid ✅</button>
  </div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAgggiNrjZw2G8ncfM9LTfr08_edEhkSJw",
    authDomain: "futurepath-c6e04.firebaseapp.com",
    projectId: "futurepath-c6e04",
    storageBucket: "futurepath-c6e04.firebasestorage.app",
    messagingSenderId: "1008950672642",
    appId: "1:1008950672642:web:0bb14abe99c19f19dbd61b"
  };

  firebase.initializeApp(firebaseConfig);

  const provider = new firebase.auth.GoogleAuthProvider();

  // 🚀 LOGIN
  function login() {
    firebase.auth().signInWithRedirect(provider);
  }

  // ✅ LOGIN STATE FIX
  firebase.auth().onAuthStateChanged((user) => {
    if (user) {
      document.getElementById("user").innerText = user.email;
      document.getElementById("status").innerText = "Free Plan";
    } else {
      document.getElementById("user").innerText = "Not logged in";
      document.getElementById("status").innerText = "Not logged in";
    }
  });

  // 💰 PAYMENT REDIRECT (YOUR LINKS ADDED)
  function buy(amount) {
    if (!firebase.auth().currentUser) {
      alert("Please login first ⚠️");
      return;
    }

    let paymentLink = "";

    if (amount == 29) {
      paymentLink = "https://rzp.io/rzp/FKHtKbmY";
    } 
    else if (amount == 99) {
      paymentLink = "https://rzp.io/rzp/62kni95";
    } 
    else if (amount == 149) {
      paymentLink = "https://rzp.io/rzp/pCtzA6rZ";
    }

    window.location.href = paymentLink;
  }

  // ❌ TEMP (REMOVE LATER)
  function fakePaid() {
    document.getElementById("status").innerText = "Premium Activated 🚀";
  }
</script>

</body>
</html>
