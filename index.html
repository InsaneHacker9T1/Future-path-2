<!DOCTYPE html>
<html>
<head>
  <title>FuturePath 🚀</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:Arial;
      text-align:center;
      padding:20px;
    }

    .card {
      background:#1e293b;
      padding:20px;
      margin:15px;
      border-radius:12px;
    }

    button {
      padding:10px 20px;
      border:none;
      border-radius:8px;
      margin:5px;
      font-size:16px;
    }

    .login {
      background:#4285F4;
      color:white;
    }

    .plan {
      background:orange;
      color:black;
    }

    .paid {
      background:green;
      color:white;
    }
  </style>
</head>

<body>

  <h1>FuturePath 🚀</h1>

  <!-- LOGIN -->
  <div class="card">
    <button class="login" onclick="login()">Login with Google</button>
    <h3 id="user">Not logged in</h3>
  </div>

  <!-- STATUS -->
  <div class="card">
    <h3 id="status">Loading...</h3>
  </div>

  <!-- PLANS -->
  <div class="card">
    <h3>Upgrade Plans 💰</h3>
    <button class="plan">₹29 Basic</button>
    <button class="plan">₹99 Pro</button>
    <button class="plan">₹149 Premium</button>
  </div>

  <!-- TEMP BUTTON -->
  <div class="card">
    <button class="paid" onclick="fakePaid()">I Have Paid ✅</button>
  </div>

<script>
  // ✅ CORRECT FIREBASE CONFIG (NO DUPLICATE)
  const firebaseConfig = {
    apiKey: "AIzaSyAgggiNrjZw2G8ncfM9LTfr08_edEhkSJw",
    authDomain: "futurepath-c6e04.firebaseapp.com",
    projectId: "futurepath-c6e04",
    storageBucket: "futurepath-c6e04.firebasestorage.app",
    messagingSenderId: "1008950672642",
    appId: "1:1008950672642:web:0bb14abe99c19f19dbd61b",
    measurementId: "G-5LQWMF51Q4"
  };

  firebase.initializeApp(firebaseConfig);

  const provider = new firebase.auth.GoogleAuthProvider();

  // 🚀 LOGIN (MOBILE SAFE)
  function login() {
    firebase.auth().signInWithRedirect(provider);
  }

  // 🔁 HANDLE REDIRECT RESULT
  firebase.auth().getRedirectResult()
  .then((result) => {
    if (result.user) {
      document.getElementById("user").innerText = result.user.email;
      document.getElementById("status").innerText = "Free Plan";
    }
  })
  .catch((error) => {
    console.log(error);
  });

  // 🔁 AUTO LOGIN STATE
  firebase.auth().onAuthStateChanged((user) => {
    if (user) {
      document.getElementById("user").innerText = user.email;
      document.getElementById("status").innerText = "Free Plan";
    } else {
      document.getElementById("status").innerText = "Not logged in";
    }
  });

  // ❌ TEMP (WILL REMOVE LATER)
  function fakePaid() {
    document.getElementById("status").innerText = "Premium Activated 🚀";
  }
</script>

</body>
</html>
