<!DOCTYPE html>
<html>
<head>
  <title>FuturePath 🚀</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:Arial;
      text-align:center;
      padding:20px;
    }

    .card {
      background:#1e293b;
      padding:20px;
      margin:15px;
      border-radius:12px;
    }

    button {
      padding:12px 22px;
      border:none;
      border-radius:10px;
      margin:6px;
      font-size:16px;
      cursor:pointer;
    }

    .login { background:#4285F4; color:white; }
    .plan { background:orange; color:black; }
    .paid { background:green; color:white; }
  </style>
</head>

<body>

  <h1>FuturePath 🚀</h1>

  <div class="card">
    <button class="login" id="loginBtn">Login with Google</button>
    <h3 id="user">Checking...</h3>
  </div>

  <div class="card">
    <h3 id="status">Checking...</h3>
  </div>

  <div class="card">
    <h3>Upgrade Plans 💰</h3>
    <button class="plan" id="b29">₹29 Basic</button>
    <button class="plan" id="b99">₹99 Pro</button>
    <button class="plan" id="b149">₹149 Premium</button>
  </div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAgggiNrjZw2G8ncfM9LTfr08_edEhkSJw",
    authDomain: "futurepath-c6e04.firebaseapp.com",
    projectId: "futurepath-c6e04",
    storageBucket: "futurepath-c6e04.firebasestorage.app",
    messagingSenderId: "1008950672642",
    appId: "1:1008950672642:web:0bb14abe99c19f19dbd61b"
  };

  firebase.initializeApp(firebaseConfig);

  const provider = new firebase.auth.GoogleAuthProvider();

  // 🔥 FORCE SESSION PERSISTENCE (IMPORTANT FIX)
  firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  // LOGIN BUTTON
  document.getElementById("loginBtn").onclick = function () {
    firebase.auth().signInWithRedirect(provider);
  };

  // 🔥 FIX LOGIN STATE (MAIN FIX)
  firebase.auth().onAuthStateChanged((user) => {
    if (user) {
      document.getElementById("user").innerText = user.email;
      document.getElementById("status").innerText = "Free Plan";
      window.currentUser = user;
    } else {
      document.getElementById("user").innerText = "Not logged in";
      document.getElementById("status").innerText = "Not logged in";
      window.currentUser = null;
    }
  });

  // 🔥 PAYMENT BUTTON FIX (EVENT LISTENER METHOD)
  document.getElementById("b29").onclick = () => pay("https://rzp.io/rzp/FKHtKbmY");
  document.getElementById("b99").onclick = () => pay("https://rzp.io/rzp/62kni95");
  document.getElementById("b149").onclick = () => pay("https://rzp.io/rzp/pCtzA6rZ");

  function pay(link) {
    if (!window.currentUser) {
      alert("Please login first ⚠️");
      return;
    }

    window.location.href = link;
  }

  // DEBUG (optional)
  firebase.auth().getRedirectResult().catch(err => console.log(err));
</script>

</body>
</html>
